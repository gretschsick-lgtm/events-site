<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>イベント一覧</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { background:#111; color:#fff; font-family: Arial, sans-serif; padding:20px; }
    h1 { font-size:24px; }
    .card { background:#1b1b1b; border:1px solid #333; border-radius:12px; padding:16px; margin:12px 0; }
    .date { color:#ffd36a; font-weight:bold; }
    .store { font-size:20px; font-weight:bold; margin:6px 0; }
    .tag { display:inline-block; background:#333; padding:4px 8px; border-radius:999px; font-size:12px; margin-top:6px; }
    a { color:#4aa3ff; text-decoration:none; }
  </style>
</head>
<body>

<h1>イベント一覧</h1>

<div class="card">
  <div class="date">05/10(日)</div>
  <div class="store">テスト店舗A</div>
  <div>来店イベント</div>
  <div class="tag">関東</div>
  <p><a href="https://x.com/" target="_blank">店舗Xを見る</a></p>
</div>

<div class="card">
  <div class="date">05/11(月)</div>
  <div class="store">テスト店舗B</div>
  <div>取材イベント</div>
  <div class="tag">東京</div>
</div>

</body>
</html>
